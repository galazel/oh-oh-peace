spring:
  application:
    name: backend
  profiles:
    active: prod
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${jwt-issuer-uri}

server:
  port: 8081

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details:

langchain4j:
  open-ai:
    api-key: ${open-ai-api-key}
    base-url: https://models.inference.ai.azure.com
    chat-model:
      model-name: gpt-4.1
      temperature: 0.7

logging:
  level:
    root: INFO
    com.oh_oh_peace.backend: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: INFO